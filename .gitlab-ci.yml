stages:
  - style
  - test

style:frontend:
  stage: style
  image: node:20
  before_script:
    - cd frontend && npm ci
  script:
    - npm run lint
  cache:
    key: frontend-deps
    paths:
      - frontend/node_modules/
  allow_failure: false

style:backend:
  stage: style
  image: maven:3.9-eclipse-temurin-17
  script:
    - cd backend && mvn spotless:check
  cache:
    key: maven-deps
    paths:
      - ~/.m2/repository
  allow_failure: false

test:frontend:
  stage: test
  image: node:20
  before_script:
    - cd frontend && npm ci
  script:
    - npm run build
  cache:
    key: frontend-deps
    paths:
      - frontend/node_modules/

test:backend:
  stage: test
  image: maven:3.9-eclipse-temurin-17
  services:
    - mysql:8.0
  variables:
    MYSQL_DATABASE: campus_hub
    MYSQL_ROOT_PASSWORD: ubuntu
  before_script:
    - apt-get update && apt-get install -y mysql-client
    - while ! mysqladmin ping -h"mysql" -P"3306" --silent; do sleep 1; done
  script:
    - cd backend && mvn test -Dspring.datasource.url=jdbc:mysql://mysql:3306/campus_hub?useSSL=false&allowPublicKeyRetrieval=true -Dspring.datasource.username=root -Dspring.datasource.password=ubuntu
  cache:
    key: maven-deps
    paths:
      - ~/.m2/repository