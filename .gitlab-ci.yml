stages:
  - style
  - build
  - test

style:frontend:
  stage: style
  image: node:20
  before_script:
    - cd frontend && npm ci
  script:
    - npm run lint
  cache:
    key: frontend-deps
    paths:
      - frontend/node_modules/
  allow_failure: false

style:backend:
  stage: style
  image: maven:3.9-eclipse-temurin-17
  script:
    - cd backend && mvn spotless:check
  cache:
    key: maven-deps
    paths:
      - ~/.m2/repository
  allow_failure: false

build:frontend:
  stage: build
  image: node:20
  before_script:
    - cd frontend && npm ci
  script:
    - npm run build
  cache:
    key: frontend-deps
    paths:
      - frontend/node_modules/

build:backend:
  stage: build
  image: maven:3.9-eclipse-temurin-17
  script:
    - cd backend && mvn clean package -DskipTests
  cache:
    key: maven-deps
    paths:
      - ~/.m2/repository


test:frontend:
  stage: test
  image: node:20
  before_script:
    - cd frontend && npm ci
  script:
    - npm run test
  cache:
    key: frontend-deps
    paths:
      - frontend/node_modules/

test:backend:
  stage: test
  image: maven:3.9-eclipse-temurin-17
  services:
    - mysql:8.0
  variables:
    MYSQL_DATABASE: campus_hub
    MYSQL_ROOT_PASSWORD: ubuntu
    SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/campus_hub?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=utf8
    SPRING_PROFILES_ACTIVE: test
  before_script:
    - apt-get update && apt-get install -y mysql-client curl
    - echo "Waiting for MySQL to be ready..."
    - while ! mysqladmin ping -h mysql -P 3306 --silent; do sleep 2; done
    - echo "MySQL is ready!"
  script:
    - cd backend
    - mvn test -Dspring.profiles.active=test
  cache:
    key: maven-deps
    paths:
      - ~/.m2/repository