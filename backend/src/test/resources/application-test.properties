# 使用GitLab CI中设置的MySQL服务
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/campus_hub?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=utf8}
spring.datasource.username=root
spring.datasource.password=${MYSQL_ROOT_PASSWORD:ubuntu}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA配置 - 测试环境使用create-drop或validate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# 日志配置减少输出
logging.level.org.springframework=WARN
logging.level.org.hibernate=WARN